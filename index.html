                showNumberOfSteps: true,
                pliMaxWidthPercentage: 30,
                pliMaxHeightPercentage: 30,
                timestamp: '1970-01-01 00:00:00',
                cleanUpPrimitivesAndSubParts: true,
                color: '#000'
            };

            manager = new LDR.InstructionsManager(model, '#', 14, null, function() {}, baseURL, step, options);
        }

        const icon1 = document.getElementById('iconReflash1');
        const icon2 = document.getElementById('iconReflash2');
        const iconFixed1 = document.getElementById('iconFixed1');
        const iconFixed2 = document.getElementById('iconFixed2');

        function getOptionTable() {
            return document.getElementById('options').getElementsByClassName('options');
        }

        function returnClickDom(idx) {
            const tables = getOptionTable();
            if (tables.length === 0) {
                return null;
            }
            const trs = tables[1].getElementsByTagName('tr');
            const tds = trs[1].getElementsByTagName('td');
            return tds[idx];
        }

        icon1.addEventListener('click', function() {
            icon1.style.display = 'none';
            icon2.style.display = 'inline-block';
            const target = returnClickDom(2);
            if (target) {
                target.click();
            }
        });

        icon2.addEventListener('click', function() {
            icon1.style.display = 'inline-block';
            icon2.style.display = 'none';
            const target = returnClickDom(3);
            if (target) {
                target.click();
            }
        });

        iconFixed1.addEventListener('click', function() {
            iconFixed1.style.display = 'none';
            iconFixed2.style.display = 'inline-block';
            if (manager && manager.unlockCameraAngle) {
                manager.unlockCameraAngle();
            }
            layer.msg('Unlocked view');
        });

        iconFixed2.addEventListener('click', function() {
            iconFixed1.style.display = 'inline-block';
            iconFixed2.style.display = 'none';
            if (manager && manager.lockCameraAngle) {
                manager.lockCameraAngle();
            }
            layer.msg('Locked view');
        });

        setTimeout(function() {
            const clickEvent = new Event('click');
            icon2.dispatchEvent(clickEvent);
            iconFixed2.dispatchEvent(clickEvent);
        }, 1500);
    </script>
    <script src="model_data.js"></script>
    <script>
    const origLDRLoad = THREE.LDRLoader.prototype.load;
    THREE.LDRLoader.prototype.load = function(id) {
        const urls = this.idToUrl(id);
        const lcMap = {};
        for (const key of Object.keys(EMBEDDED_LDR_DATA)) {
            lcMap[key.toLowerCase()] = key;
        }
        for (const url of urls) {
            const lcUrl = url.toLowerCase();
            if (lcMap[lcUrl]) {
                const data = EMBEDDED_LDR_DATA[lcMap[lcUrl]];
                this.partTypes[id] = true;
                this.unloadedFiles++;
                this.parse(data, id);
                this.unloadedFiles--;
                this.reportProgress(id);
                return;
            }
            for (const lcKey of Object.keys(lcMap)) {
                if (lcUrl.endsWith("/" + lcKey)) {
                    const data = EMBEDDED_LDR_DATA[lcMap[lcKey]];
                    this.partTypes[id] = true;
                    this.unloadedFiles++;
                    this.parse(data, id);
                    this.unloadedFiles--;
                    this.reportProgress(id);
                    return;
                }
            }
        }
        return origLDRLoad.call(this, id);
    };
    </script>
